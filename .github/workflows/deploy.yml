name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Set this to your default branch name

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inject API Key from Secrets
        run: |
          sed -i 's/REPLACE_ME_WITH_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/g' index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder where your HTML file is located
          branch: gh-pages # The branch the action will deploy to
